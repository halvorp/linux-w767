# Drop this file into /loader/entries/ on a systemd-boot-managed FAT32 ESP.
# Place the Image, sc8180x-samsung-w767.dtb, and w767-initramfs.img at the
# root of the same ESP. Boot via systemd-boot.

title    Samsung Galaxy Book S (W767) — iter-66 W767-native board-2.bin
version  iter-66 — kernel 6.6 (sc8180x-mainline @ 27c30b32) + ath10k WCN3990 hw_params .fw.board patch + W767-native board-2.bin (matches qmi-board-id=ff,qmi-chip-id=30224). Display + GPU + DSPs + WiFi all working.
linux    /Image
initrd   /w767-initramfs.img
devicetree /sc8180x-samsung-w767.dtb
options  console=tty0 loglevel=6 consoleblank=0 rdinit=/init earlycon=efifb keep_bootcon net.ifnames=0 iommu.passthrough=0 iommu.strict=0 pcie_aspm.policy=powersupersave clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime
