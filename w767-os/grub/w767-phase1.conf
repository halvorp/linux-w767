title      w767 Phase 1 (custom kernel, Fedora rootfs)
version    w767-phase1
linux      /vmlinuz-w767
initrd     /initramfs-7.0.0-62.fc45.aarch64.img
devicetree /dtb-w767/qcom/sc8180x-samsung-w767.dtb
# SC8180X freeze-prevention quirks (per docs/00-hardware-combined.md section 6,
# sourced from pmOS device-samsung-w767 + jhovold X13s wiki):
#   clk_ignore_unused  - qcom clock framework misidentifies in-use SoC blocks
#                        as unused and gates them off, freezing the kernel
#   pd_ignore_unused   - same problem for power domains
#   arm64.nopauth      - Cortex-A76 ARMv8.3 pointer-auth + SC8180X firmware
#                        interact buggily and crash the kernel
#   efi=noruntime      - stock Samsung UEFI hangs on certain runtime calls
#   iommu.passthrough=0 / iommu.strict=0 - SMMU settings SC8180X needs for
#                        stable UFS/USB/PCIe DMA
#   pcie_aspm.policy=powersupersave - link-state policy (matters once ath11k
#                        WiFi probes; harmless otherwise)
#   earlycon=efifb keep_bootcon - write kernel messages straight to the UEFI
#                        GOP framebuffer from the first printk after EFI
#                        handoff, until DRM_MSM/simpledrm takes over. Catches
#                        early hangs (iter-19 black-screen episode) without
#                        needing serial.
options    root=UUID=@ROOT_UUID@ ro rootflags=subvol=root earlycon=efifb keep_bootcon console=tty0 loglevel=7 clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime iommu.passthrough=0 iommu.strict=0 pcie_aspm.policy=powersupersave dyndbg="file drivers/gpu/drm/msm/* +p"
