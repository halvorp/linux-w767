title      w767 Phase 2 (initramfs distro)
version    w767-phase2
linux      /vmlinuz-w767-initramfs
initrd     /w767-initramfs.img
devicetree /dtb-w767-initramfs/qcom/sc8180x-samsung-w767.dtb
# Same SC8180X freeze-prevention quirks as Phase 1 (see w767-phase1.conf
# for per-flag rationale). Omitting them caused early hangs even when
# Phase 1 booted clean from the Fedora kernel.
#
# earlycon=efifb keep_bootcon: routes early printk to the UEFI GOP
# framebuffer immediately, so we can see boot progress (or where a hang
# happens) without serial. ramoops@0x9b500000 in the DTS provides the
# post-mortem path if the screen also goes dark.
options    console=tty0 loglevel=7 rdinit=/init net.ifnames=0 panic=10 earlycon=efifb keep_bootcon clk_ignore_unused pd_ignore_unused arm64.nopauth efi=noruntime iommu.passthrough=0 iommu.strict=0
